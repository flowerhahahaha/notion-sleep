<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>睡眠统计</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0f0f12;
    color: #e8e8e8;
    font-family: 'SF Pro Display', -apple-system, 'PingFang SC', sans-serif;
    padding: 12px;
    font-size: 12px;
  }
  .container { max-width: 860px; margin: 0 auto; }

  /* Header */
  .header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 12px; flex-wrap: wrap; gap: 8px;
  }
  .title { font-size: 14px; font-weight: 600; color: #fff; letter-spacing: 0.04em; }
  .week-nav { display: flex; align-items: center; gap: 8px; }
  .week-label { font-size: 11px; color: #888; min-width: 150px; text-align: center; }
  .nav-btn {
    background: #1e1e24; border: 1px solid #2a2a32; color: #aaa;
    width: 28px; height: 28px; border-radius: 6px; cursor: pointer;
    font-size: 14px; display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .nav-btn:hover { background: #2a2a32; color: #fff; }

  .status-bar { font-size: 11px; color: #555; height: 16px; margin-bottom: 6px; }
  .status-bar.error { color: #ff6b6b; }

  /* Chart */
  .chart-wrapper { display: flex; align-items: flex-start; }
  .y-axis { display: flex; flex-direction: column; padding-top: 18px; flex-shrink: 0; width: 72px; }
  .y-label {
    height: 22px; display: flex; align-items: center; justify-content: flex-end;
    padding-right: 8px; font-size: 10px; color: #888; cursor: pointer;
    transition: color 0.15s; gap: 6px; margin-bottom: 2px;
  }
  .y-label:hover { color: #F5EC00; }
  .y-date { color: #555; font-size: 9px; }

  .grid-area { flex: 1; overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .x-axis { display: flex; margin-bottom: 2px; height: 18px; min-width: 520px; }
  .x-label { flex: 1; text-align: center; font-size: 9px; color: #555; }

  .grid { display: flex; flex-direction: column; gap: 2px; min-width: 520px; }
  .grid-row { display: flex; gap: 2px; height: 22px; }
  .cell {
    flex: 1; height: 22px; background: #1c1c22; border-radius: 3px;
    position: relative; cursor: pointer; transition: background 0.12s; overflow: hidden;
  }
  .cell:hover { background: #26262f; }
  .cell-fill {
    position: absolute; top: 0; bottom: 0;
    background: #F5EC00; opacity: 0; pointer-events: none;
    border-radius: 2px;
  }
  .cell-fill.active { opacity: 0.9; background: #F5EC00; }

  /* 格子内文字样式 - 改为浅色，清晰可见 */
  .time-marker {
    position: absolute; top: 1px; font-size: 7px;
    color: #0f0f12; font-weight: 800; white-space: nowrap;
    z-index: 10; pointer-events: none; line-height: 1;
    background: rgba(245,236,0,0.3);
    padding: 0 2px;
    border-radius: 3px;
  }
  .marker-start { left: 2px; }
  .marker-end { right: 2px; }
  .duration-badge {
    position: absolute; bottom: 1px; right: 2px;
    font-size: 7px; font-weight: 800; color: #0f0f12;
    pointer-events: none; z-index: 10; line-height: 1;
    background: rgba(245,236,0,0.5);
    padding: 0 2px;
    border-radius: 3px;
  }
  .score-badge {
    position: absolute; bottom: 1px; left: 2px;
    font-size: 7px; font-weight: 800; color: #0f0f12;
    pointer-events: none; z-index: 10; line-height: 1;
    background: rgba(245,236,0,0.5);
    padding: 0 2px;
    border-radius: 3px;
  }

  /* Stats */
  .stats-bar {
    display: flex; gap: 16px; margin-top: 12px;
    padding: 10px 14px; background: #1a1a20;
    border-radius: 8px; border: 1px solid #22222a;
    flex-wrap: wrap;
  }
  .stat-item { display: flex; flex-direction: column; gap: 3px; }
  .stat-label { font-size: 9px; color: #666; letter-spacing: 0.05em; text-transform: uppercase; }
  .stat-value { font-size: 13px; font-weight: 600; color: #F5EC00; }
  .stat-value.dim { color: #999; font-size: 11px; }

  /* Modal - 手机优化，不会超出屏幕 */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.75); z-index: 1000;
    align-items: center; justify-content: center;
    backdrop-filter: blur(4px);
    padding: 16px;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: #1a1a22; border: 1px solid #2e2e3a;
    border-radius: 20px; padding: 20px; 
    width: 100%; max-width: 320px;
    max-height: 85vh;
    overflow-y: auto;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    margin: auto;
  }
  .modal-title { font-size: 15px; font-weight: 600; color: #fff; margin-bottom: 2px; }
  .modal-subtitle { font-size: 11px; color: #777; margin-bottom: 18px; }
  .field-group { margin-bottom: 14px; }
  .field-label { font-size: 10px; color: #aaa; margin-bottom: 5px; letter-spacing: 0.05em; text-transform: uppercase; font-weight: 500; }
  .field-input {
    width: 100%; background: #0f0f12; border: 1px solid #2e2e3a;
    border-radius: 10px; color: #fff; font-size: 15px;
    padding: 10px 12px; outline: none; transition: border-color 0.15s;
    font-family: inherit;
  }
  .field-input:focus { border-color: #F5EC00; }
  .field-hint { font-size: 9px; color: #555; margin-top: 5px; }
  .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
  .btn {
    flex: 1; padding: 10px 0; border-radius: 10px;
    font-size: 13px; font-weight: 600; cursor: pointer;
    border: none; transition: all 0.15s; text-align: center;
  }
  .btn-primary { background: #F5EC00; color: #0f0f12; }
  .btn-primary:hover { background: #ffe900; }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-secondary { background: #25252e; color: #ccc; border: 1px solid #353540; }
  .btn-secondary:hover { background: #2f2f3a; color: #fff; }
  .btn-danger { background: transparent; color: #ff6b6b; border: 1px solid #ff6b6b44; flex: 0.5; }
  .btn-danger:hover { background: #ff6b6b22; }
  .error-msg { font-size: 10px; color: #ff6b6b; margin-top: 8px; text-align: center; }
  
  /* 滚动条美化 */
  .grid-area::-webkit-scrollbar {
    height: 4px;
  }
  .grid-area::-webkit-scrollbar-track {
    background: #1c1c22;
    border-radius: 4px;
  }
  .grid-area::-webkit-scrollbar-thumb {
    background: #3a3a44;
    border-radius: 4px;
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="title">💤 睡眠统计</div>
    <div class="week-nav">
      <button class="nav-btn" id="prevWeek">‹</button>
      <div class="week-label" id="weekLabel"></div>
      <button class="nav-btn" id="nextWeek">›</button>
    </div>
  </div>
  <div class="status-bar" id="statusBar"></div>
  <div class="chart-wrapper">
    <div class="y-axis" id="yAxis"></div>
    <div class="grid-area">
      <div class="x-axis" id="xAxis"></div>
      <div class="grid" id="grid"></div>
    </div>
  </div>
  <div class="stats-bar">
    <div class="stat-item"><div class="stat-label">本周均值</div><div class="stat-value" id="statAvg">—</div></div>
    <div class="stat-item"><div class="stat-label">总睡眠</div><div class="stat-value" id="statTotal">—</div></div>
    <div class="stat-item"><div class="stat-label">平均评分</div><div class="stat-value" id="statScore">—</div></div>
    <div class="stat-item"><div class="stat-label">最佳夜晚</div><div class="stat-value dim" id="statBest">—</div></div>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-title" id="modalTitle"></div>
    <div class="modal-subtitle" id="modalSubtitle"></div>
    <div class="field-group">
      <div class="field-label">🌙 入睡时间</div>
      <input class="field-input" id="inputStart" placeholder="例如 22:30" maxlength="5" autocomplete="off">
      <div class="field-hint">21:00后为当晚，10:00前为次日</div>
    </div>
    <div class="field-group">
      <div class="field-label">☀️ 起床时间</div>
      <input class="field-input" id="inputEnd" placeholder="例如 07:00" maxlength="5" autocomplete="off">
    </div>
    <div class="field-group">
      <div class="field-label">⭐ 睡眠评分（0–100）</div>
      <input class="field-input" id="inputScore" placeholder="0 – 100" maxlength="3" autocomplete="off">
    </div>
    <div class="error-msg" id="errorMsg"></div>
    <div class="modal-actions">
      <button class="btn btn-danger" id="btnDelete" style="display:none">删除</button>
      <button class="btn btn-secondary" id="btnCancel">取消</button>
      <button class="btn btn-primary" id="btnSave">保存</button>
    </div>
  </div>
</div>

<script>
const HOUR_START = 21;
const HOUR_COUNT = 13;
const DAYS = ['周一','周二','周三','周四','周五','周六','周日'];

let weekOffset = 0;
let weekCache = {};
let editingDay = null;

async function apiFetch(method, body) {
  const url = '/api/notion';
  if (method === 'GET') {
    const r = await fetch(`${url}?${new URLSearchParams(body)}`);
    return r.json();
  }
  const r = await fetch(url, { method, headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
  return r.json();
}

function getWeekMonday(offset = 0) {
  const d = new Date();
  const day = d.getDay();
  d.setDate(d.getDate() + (day === 0 ? -6 : 1 - day) + offset * 7);
  d.setHours(0,0,0,0);
  return d;
}
function weekKey(m) { return m.toISOString().slice(0,10); }
function formatWeekLabel(m) {
  const e = new Date(m); e.setDate(e.getDate()+6);
  const f = d => `${d.getMonth()+1}月${d.getDate()}日`;
  return `${m.getFullYear()}年 ${f(m)} — ${f(e)}`;
}
function getWeekDates(m) {
  return Array.from({length:7}, (_,i) => { const d = new Date(m); d.setDate(d.getDate()+i); return d; });
}
function dateStr(d) { return d.toISOString().slice(0,10); }

function timeToMins(str) {
  if (!str) return -1;
  const [h, m] = str.split(':').map(Number);
  let mins = h * 60 + m;
  if (h < 11) mins += 1440;
  return mins - HOUR_START * 60;
}
function durationStr(m) {
  const sign = m < 0 ? -1 : 1;
  const absM = Math.abs(m);
  const h = Math.floor(absM/60), mm = absM%60;
  return (sign === -1 ? '-' : '') + (mm > 0 ? `${h}h${mm}m` : `${h}h`);
}
function parseTimeInput(str) {
  str = str.trim();
  if (/^\d{3,4}$/.test(str)) str = str.slice(0,-2)+':'+str.slice(-2);
  if (!/^\d{1,2}:\d{2}$/.test(str)) return null;
  const [h, m] = str.split(':').map(Number);
  if (isNaN(h)||isNaN(m)||h>23||m>59) return null;
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
}

function setStatus(msg, isErr=false) {
  const el = document.getElementById('statusBar');
  el.textContent = msg;
  el.className = 'status-bar' + (isErr ? ' error' : '');
}

async function loadWeek(monday) {
  const key = weekKey(monday);
  if (weekCache[key]) return;
  setStatus('加载中…');
  const dates = getWeekDates(monday);
  try {
    const data = await apiFetch('GET', { start: dateStr(dates[0]), end: dateStr(dates[6]) });
    if (data.object === 'error') throw new Error(data.message || data.error);
    weekCache[key] = {};
    for (const [dateVal, entry] of Object.entries(data)) {
      const di = dates.findIndex(d => dateStr(d) === dateVal);
      if (di !== -1) weekCache[key][di] = entry;
    }
    setStatus('');
  } catch(e) {
    setStatus('加载失败：' + e.message, true);
    weekCache[key] = {};
  }
}

function buildXAxis() {
  const el = document.getElementById('xAxis');
  el.innerHTML = '';
  for (let i = 0; i < HOUR_COUNT; i++) {
    const lbl = document.createElement('div');
    lbl.className = 'x-label';
    lbl.textContent = `${String((HOUR_START+i)%24).padStart(2,'0')}:00`;
    el.appendChild(lbl);
  }
}

function render() {
  const monday = getWeekMonday(weekOffset);
  const key = weekKey(monday);
  document.getElementById('weekLabel').textContent = formatWeekLabel(monday);
  const weekData = weekCache[key] || {};
  const dates = getWeekDates(monday);

  const yAxis = document.getElementById('yAxis');
  yAxis.innerHTML = '';
  DAYS.forEach((day, di) => {
    const d = dates[di];
    const lbl = document.createElement('div');
    lbl.className = 'y-label';
    lbl.innerHTML = `<span class="y-date">${d.getMonth()+1}/${d.getDate()}</span>${day}`;
    lbl.addEventListener('click', () => openModal(key, di, dateStr(d)));
    yAxis.appendChild(lbl);
  });

  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  DAYS.forEach((_, di) => {
    const row = document.createElement('div');
    row.className = 'grid-row';
    const entry = weekData[di];
    let sm = null, em = null;
    if (entry?.start && entry?.end) { sm = timeToMins(entry.start); em = timeToMins(entry.end); }

    for (let ci = 0; ci < HOUR_COUNT; ci++) {
      const cs = ci*60, ce = (ci+1)*60;
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.addEventListener('click', () => openModal(key, di, dateStr(dates[di])));

      if (sm !== null && em !== null && sm >= 0 && em <= HOUR_COUNT*60 && em > sm) {
        const os = Math.max(sm, cs), oe = Math.min(em, ce);
        if (oe > os) {
          const fill = document.createElement('div');
          fill.className = 'cell-fill active';
          fill.style.left  = ((os-cs)/60*100)+'%';
          fill.style.right = ((ce-oe)/60*100)+'%';
          cell.appendChild(fill);

          if (os === sm) {
            const mk = document.createElement('div');
            mk.className = 'time-marker marker-start';
            mk.textContent = entry.start;
            cell.appendChild(mk);
            if (entry.score !== '') {
              const sb = document.createElement('div');
              sb.className = 'score-badge';
              sb.textContent = entry.score;
              cell.appendChild(sb);
            }
          }
          if (oe === em) {
            const mk = document.createElement('div');
            mk.className = 'time-marker marker-end';
            mk.textContent = entry.end;
            cell.appendChild(mk);
            const db = document.createElement('div');
            db.className = 'duration-badge';
            db.textContent = durationStr(em-sm);
            cell.appendChild(db);
          }
        }
      }
      row.appendChild(cell);
    }
    grid.appendChild(row);
  });

  updateStats(weekData);
}

function updateStats(weekData) {
  const entries = Object.values(weekData).filter(e => e?.start && e?.end);
  if (!entries.length) {
    ['statAvg','statTotal','statScore','statBest'].forEach(id => document.getElementById(id).textContent = '—');
    return;
  }
  const durs = entries.map(e => timeToMins(e.end)-timeToMins(e.start));
  const total = durs.reduce((a,b)=>a+b,0);
  document.getElementById('statAvg').textContent   = durationStr(Math.round(total/entries.length));
  document.getElementById('statTotal').textContent = durationStr(total);
  const scores = entries.filter(e=>e.score!=='').map(e=>Number(e.score));
  document.getElementById('statScore').textContent = scores.length ? (scores.reduce((a,b)=>a+b,0)/scores.length).toFixed(1) : '—';
  const maxIdx = durs.indexOf(Math.max(...durs));
  const dayKeys = Object.keys(weekData).map(Number);
  document.getElementById('statBest').textContent = DAYS[dayKeys[maxIdx]]+' '+durationStr(durs[maxIdx]);
}

function openModal(wKey, dayIndex, date) {
  editingDay = { wKey, dayIndex, date };
  const entry = (weekCache[wKey]||{})[dayIndex];
  document.getElementById('modalTitle').textContent = `${DAYS[dayIndex]} · 睡眠记录`;
  document.getElementById('modalSubtitle').textContent = date;
  document.getElementById('inputStart').value = entry?.start||'';
  document.getElementById('inputEnd').value   = entry?.end||'';
  document.getElementById('inputScore').value = entry?.score??'';
  document.getElementById('errorMsg').textContent = '';
  document.getElementById('btnDelete').style.display = entry ? 'block' : 'none';
  document.getElementById('btnSave').disabled = false;
  document.getElementById('modalOverlay').classList.add('open');
  document.getElementById('inputStart').focus();
}
function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  editingDay = null;
}

document.getElementById('btnCancel').addEventListener('click', closeModal);
document.getElementById('modalOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
});
document.getElementById('btnDelete').addEventListener('click', async () => {
  const entry = (weekCache[editingDay.wKey]||{})[editingDay.dayIndex];
  if (!entry) return;
  const saved = { ...editingDay };
  closeModal();
  setStatus('删除中…');
  try {
    await apiFetch('DELETE', { pageId: entry.pageId });
    delete weekCache[saved.wKey];
    await loadWeek(getWeekMonday(weekOffset));
    render();
  } catch(e) { setStatus('删除失败', true); }
});
document.getElementById('btnSave').addEventListener('click', saveEntry);
document.addEventListener('keydown', e => {
  if (e.key==='Escape') closeModal();
  if (e.key==='Enter' && document.getElementById('modalOverlay').classList.contains('open')) saveEntry();
});
['inputStart','inputEnd'].forEach(id => {
  document.getElementById(id).addEventListener('input', function() {
    let v = this.value.replace(/[^0-9:]/g,'');
    if (v.length===2 && !v.includes(':') && this._prev?.length===1) v+=':';
    this.value = v; this._prev = v;
  });
});

async function saveEntry() {
  const errEl = document.getElementById('errorMsg');
  const start = parseTimeInput(document.getElementById('inputStart').value);
  const end   = parseTimeInput(document.getElementById('inputEnd').value);
  const rawScore = document.getElementById('inputScore').value.trim();
  if (!start) { errEl.textContent='入睡时间格式有误，请使用 HH:MM'; return; }
  if (!end)   { errEl.textContent='起床时间格式有误，请使用 HH:MM'; return; }
  const sm = timeToMins(start), em = timeToMins(end);
  if (sm < 0 || sm >= HOUR_COUNT*60) { errEl.textContent='入睡时间需在 21:00 ~ 次日 10:00 之间'; return; }
  if (em <= sm) { errEl.textContent='起床时间需晚于入睡时间'; return; }
  if (em > HOUR_COUNT*60) { errEl.textContent='起床时间需在 10:00 之前'; return; }
  let score = '';
  if (rawScore !== '') {
    const s = Number(rawScore);
    if (isNaN(s)||s<0||s>100) { errEl.textContent='评分需在 0–100 之间'; return; }
    score = s;
  }
  document.getElementById('btnSave').disabled = true;
  setStatus('保存中…');
  const existing = (weekCache[editingDay.wKey]||{})[editingDay.dayIndex];
  const saved = { ...editingDay };
  try {
    await apiFetch('POST', { pageId: existing?.pageId||null, date: saved.date, sleepStart: start, sleepEnd: end, score });
    delete weekCache[saved.wKey];
    closeModal();
    await loadWeek(getWeekMonday(weekOffset));
    render();
  } catch(e) {
    setStatus('保存失败：'+e.message, true);
    document.getElementById('btnSave').disabled = false;
  }
}

document.getElementById('prevWeek').addEventListener('click', async () => { weekOffset--; await loadWeek(getWeekMonday(weekOffset)); render(); });
document.getElementById('nextWeek').addEventListener('click', async () => { weekOffset++; await loadWeek(getWeekMonday(weekOffset)); render(); });

buildXAxis();
(async () => { await loadWeek(getWeekMonday(weekOffset)); render(); })();
</script>
</body>
</html>
